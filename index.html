<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>Vishal Groups - ERP System</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--p:#2563eb;--pd:#1d4ed8;--pl:#dbeafe;--s:#059669;--w:#d97706;--d:#dc2626;--bg:#f0f2f5;--wh:#fff;--tx:#1e293b;--tl:#64748b;--br:#e2e8f0;--sb:260px;--rd:12px}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden}

/* SIDEBAR */
.sb{position:fixed;left:0;top:0;bottom:0;width:var(--sb);background:linear-gradient(180deg,#0f172a 0%,#1e293b 100%);color:#fff;overflow-y:auto;z-index:200;transition:transform .3s ease}
.sb::-webkit-scrollbar{width:0}
.sb-h{padding:20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px}
.sb-logo{width:44px;height:44px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;box-shadow:0 4px 12px rgba(37,99,235,.3)}
.sb-brand{font-size:15px;font-weight:700;line-height:1.3}.sb-brand span{display:block;font-size:9px;color:#64748b;font-weight:500;letter-spacing:1.5px;margin-top:3px;text-transform:uppercase}
.sb-x{display:none;background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer;padding:6px;margin-left:auto;border-radius:8px}
.sb-x:hover{background:rgba(255,255,255,.1);color:#fff}
.sb-sec{padding:8px 20px 4px;font-size:9px;text-transform:uppercase;color:#475569;letter-spacing:2px;margin-top:16px;font-weight:700}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;font-size:13px;color:#94a3b8;border-left:3px solid transparent;transition:all .2s;min-height:42px;position:relative}
.sb-item:hover{background:rgba(255,255,255,.04);color:#cbd5e1}
.sb-item.active{background:rgba(37,99,235,.12);color:#60a5fa;border-left-color:#3b82f6;font-weight:600}
.sb-item .icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.sb-item .badge-dot{position:absolute;right:16px;width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

.sb-footer{position:sticky;bottom:0;padding:12px 16px;background:rgba(15,23,42,.9);backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.06)}
.sync-info{display:flex;align-items:center;gap:8px;font-size:11px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;flex-shrink:0}

.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;backdrop-filter:blur(2px)}
.sb-overlay.show{display:block}

/* TOPBAR */
.tb{position:fixed;top:0;left:var(--sb);right:0;height:60px;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:99;gap:12px}
.tb-burger{display:none;background:none;border:none;font-size:22px;cursor:pointer;padding:6px;color:var(--tx);border-radius:8px}
.tb-left{display:flex;align-items:center;gap:12px;flex:1}
.tb-search{display:flex;align-items:center;gap:8px;background:#f1f5f9;border:1px solid transparent;border-radius:10px;padding:8px 14px;flex:1;max-width:360px;transition:all .2s}
.tb-search:focus-within{border-color:var(--p);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.tb-search input{border:none;background:none;outline:none;font-size:13px;width:100%;color:var(--tx)}
.tb-right{display:flex;gap:8px;align-items:center}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;box-shadow:0 2px 8px rgba(37,99,235,.3)}

/* MAIN */
.main{margin-left:var(--sb);margin-top:60px;padding:20px;min-height:calc(100vh - 60px)}
.page{display:none;animation:fadeIn .3s ease}.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* PAGE HEADER */
.pg-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.pg-head h2{font-size:20px;font-weight:800;display:flex;align-items:center;gap:8px}
.pg-head p{font-size:12px;color:var(--tl);margin-top:4px}

/* CARDS */
.card{background:#fff;border-radius:var(--rd);border:1px solid var(--br);padding:18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.card-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.stat{background:#fff;border-radius:var(--rd);padding:14px;border:1px solid var(--br);display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:transform .2s}
.stat:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.stat-ic{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.stat-ic.bl{background:#dbeafe;color:#2563eb}.stat-ic.gr{background:#d1fae5;color:#059669}
.stat-ic.or{background:#fef3c7;color:#d97706}.stat-ic.rd{background:#fee2e2;color:#dc2626}
.stat-ic.pu{background:#ede9fe;color:#7c3aed}.stat-ic.pk{background:#fce7f3;color:#be185d}
.stat-ic.cy{background:#cffafe;color:#0891b2}
.stat-val{font-size:17px;font-weight:800;line-height:1.2}.stat-lbl{font-size:10px;color:var(--tl);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}

/* HERO BANNER */
.hero{border-radius:var(--rd);padding:20px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-50%;right:-20%;width:200px;height:200px;background:rgba(255,255,255,.06);border-radius:50%}
.hero.red{background:linear-gradient(135deg,#dc2626 0%,#f59e0b 100%)}
.hero.blue{background:linear-gradient(135deg,#2563eb 0%,#7c3aed 100%)}
.hero.green{background:linear-gradient(135deg,#059669 0%,#0d9488 100%)}
.hero.dark{background:linear-gradient(135deg,#0f172a 0%,#334155 100%)}
.hero h3{font-size:15px;font-weight:700;margin:0;position:relative;z-index:1}
.hero .hg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:14px;position:relative;z-index:1}
.hero .hb{background:rgba(255,255,255,.12);padding:12px;border-radius:10px;backdrop-filter:blur(4px)}
.hero .hb.hl{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3)}
.hero .hl-txt{font-size:9px;opacity:.85;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.hero .hv{font-size:16px;font-weight:800;margin-top:4px}
.hero .hs{font-size:9px;opacity:.65;margin-top:3px}

/* TABLES */
.tw{overflow-x:auto;max-height:500px;-webkit-overflow-scrolling:touch;border-radius:10px;border:1px solid var(--br)}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:600px}
th{background:#f8fafc;padding:10px 12px;text-align:left;font-weight:700;color:var(--tl);border-bottom:2px solid var(--br);white-space:nowrap;position:sticky;top:0;z-index:5;font-size:10px;text-transform:uppercase;letter-spacing:.3px}
td{padding:9px 12px;border-bottom:1px solid #f1f5f9;white-space:nowrap}
tr:hover{background:#f8fafc}
.amt{font-family:'SF Mono','Courier New',monospace;font-weight:700;letter-spacing:-.3px}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{height:0}
.tab{padding:8px 16px;border-radius:20px;cursor:pointer;font-size:11px;background:#f1f5f9;color:var(--tl);border:1px solid transparent;font-weight:600;white-space:nowrap;flex-shrink:0;transition:all .2s}
.tab:hover{background:#e2e8f0}
.tab.active{background:var(--p);color:#fff;border-color:var(--p);box-shadow:0 2px 8px rgba(37,99,235,.3)}
.tab-body{display:none}.tab-body.active{display:block}

/* FORMS */
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:16px}
.fi{display:flex;flex-direction:column;gap:5px}
.fi label{font-size:10px;font-weight:700;color:var(--tl);text-transform:uppercase;letter-spacing:.5px}
.fi input,.fi select,.fi textarea{padding:10px 14px;border:1.5px solid var(--br);border-radius:10px;font-size:13px;outline:none;width:100%;background:#fff;transition:all .2s;font-family:inherit}
.fi input:focus,.fi select:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

/* BUTTONS */
.btn{padding:10px 18px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;min-height:38px;transition:all .2s;font-family:inherit}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.btn:active{transform:translateY(0)}
.btn-p{background:var(--p);color:#fff}.btn-s{background:var(--s);color:#fff}
.btn-d{background:var(--d);color:#fff}.btn-o{background:#fff;border:1.5px solid var(--br);color:var(--tx)}
.btn-sm{padding:7px 14px;font-size:11px;min-height:32px}
.btn-icon{width:38px;padding:0;justify-content:center}

/* BADGES */
.badge{padding:4px 10px;border-radius:20px;font-size:9px;font-weight:700;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;letter-spacing:.3px}
.b-pend{background:#fef3c7;color:#92400e}.b-paid{background:#d1fae5;color:#065f46}
.b-over{background:#fee2e2;color:#991b1b}.b-hold{background:#e0e7ff;color:#3730a3}
.b-new{background:#dbeafe;color:#1e40af}.b-rep{background:#d1fae5;color:#065f46}
.b-live{background:#fce7f3;color:#9f1239}

/* SEARCH */
.srch{display:flex;align-items:center;gap:8px;border:1.5px solid var(--br);border-radius:10px;padding:8px 14px;background:#fff;max-width:280px;transition:all .2s}
.srch:focus-within{border-color:var(--p);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.srch input{border:none;outline:none;font-size:12px;width:100%}
.fbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}

/* DROPDOWN */
.dds{position:relative}
.ddl{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--br);border-radius:10px;max-height:200px;overflow-y:auto;z-index:50;display:none;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.ddl.show{display:block}
.ddi{padding:10px 14px;cursor:pointer;font-size:12px;border-bottom:1px solid #f8fafc;transition:background .15s}
.ddi:hover{background:var(--pl)}
.ddi:last-child{border:none}

/* MISC */
.divider{border-top:2px solid var(--br);margin:18px 0;padding-top:16px}
.sec-title{font-size:13px;font-weight:700;color:var(--p);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.del{color:var(--d);cursor:pointer;border:none;background:none;font-size:14px;padding:4px 6px;border-radius:6px;transition:background .2s}
.del:hover{background:#fee2e2}
.sec-row{color:#fff}.sec-row td{padding:10px 12px!important;font-weight:700;font-size:11px}
.sec-row.ve{background:linear-gradient(90deg,#f97316,#f59e0b)}.sec-row.vtpl{background:linear-gradient(90deg,#7c3aed,#a855f7)}
.tot-row{font-weight:700}.tot-row.ve{background:#fff7ed}.tot-row.vtpl{background:#f5f3ff}
.g-total{background:linear-gradient(90deg,#1e40af,#7c3aed);color:#fff}
.g-total td{padding:12px 14px!important;font-weight:800;font-size:12px}
.age-b{padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;color:#fff;letter-spacing:.3px}
.progress{width:100%;height:5px;background:#e2e8f0;border-radius:3px;margin-top:8px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#2563eb,#7c3aed);border-radius:3px;transition:width .3s}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px;width:94%;max-width:600px;max-height:85vh;overflow-y:auto;padding:24px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-x{background:#f1f5f9;border:none;font-size:14px;cursor:pointer;color:var(--tl);padding:8px 12px;border-radius:8px;transition:all .2s}
.modal-x:hover{background:#e2e8f0;color:var(--tx)}

/* SUMMARY BOX */
.summary-box{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:1.5px solid #bbf7d0;border-radius:var(--rd);padding:16px;margin-bottom:16px}

/* AI CHATBOT */
.ai-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 6px 24px rgba(37,99,235,.35);z-index:500;display:flex;align-items:center;justify-content:center;transition:all .3s;animation:fabFloat 3s ease-in-out infinite}
.ai-fab:hover{transform:scale(1.1)}
.ai-fab.active{background:linear-gradient(135deg,#dc2626,#f59e0b);animation:none}
@keyframes fabFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.ai-dot{position:absolute;top:2px;right:2px;width:14px;height:14px;background:#22c55e;border-radius:50%;border:2px solid #fff;font-size:7px;display:flex;align-items:center;justify-content:center;font-weight:800}

.ai-chat{position:fixed;bottom:90px;right:24px;width:380px;max-width:calc(100vw - 32px);height:520px;max-height:calc(100vh - 120px);background:#fff;border-radius:16px;box-shadow:0 12px 48px rgba(0,0,0,.18);z-index:500;display:none;flex-direction:column;overflow:hidden;border:1px solid var(--br)}
.ai-chat.show{display:flex}
.ai-header{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px}
.ai-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ai-info{flex:1}.ai-info h4{font-size:13px;margin:0;font-weight:600}.ai-info span{font-size:9px;color:#94a3b8;display:flex;align-items:center;gap:4px;margin-top:2px}
.ai-close{background:rgba(255,255,255,.1);border:none;color:#94a3b8;font-size:16px;cursor:pointer;padding:6px 10px;border-radius:8px;transition:all .2s}
.ai-close:hover{background:rgba(255,255,255,.2);color:#fff}
.ai-body{flex:1;overflow-y:auto;padding:14px;background:#f8fafc;display:flex;flex-direction:column;gap:10px}
.ai-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:12px;line-height:1.6;word-wrap:break-word;animation:msgSlide .3s ease}
@keyframes msgSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ai-msg.bot{background:#fff;color:var(--tx);border:1px solid var(--br);border-bottom-left-radius:4px;align-self:flex-start}
.ai-msg.user{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.ai-msg .mh{font-size:9px;opacity:.6;margin-bottom:4px;font-weight:600}
.ai-msg strong{color:var(--p)}
.ai-msg.user strong{color:#fff}
.ai-msg pre{background:#0f172a;color:#e2e8f0;padding:8px;border-radius:6px;overflow-x:auto;font-size:10px;margin:6px 0}
.ai-msg table{width:100%;border-collapse:collapse;margin:6px 0;font-size:10px}
.ai-msg table th,.ai-msg table td{border:1px solid var(--br);padding:4px 6px;text-align:left}
.ai-msg table th{background:#f1f5f9;font-weight:700}
.ai-typing{display:flex;align-items:center;gap:4px;padding:10px 14px;align-self:flex-start}
.ai-typing span{width:6px;height:6px;border-radius:50%;background:#94a3b8;animation:typeDot 1.4s infinite}
.ai-typing span:nth-child(2){animation-delay:.2s}
.ai-typing span:nth-child(3){animation-delay:.4s}
@keyframes typeDot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.ai-quick{display:flex;gap:6px;flex-wrap:wrap;padding:8px 14px;background:#fff;border-top:1px solid var(--br)}
.ai-qb{padding:5px 12px;border-radius:16px;border:1px solid var(--br);background:#f8fafc;color:var(--tx);font-size:10px;cursor:pointer;white-space:nowrap;font-weight:500;transition:all .2s}
.ai-qb:hover{background:var(--pl);border-color:var(--p);color:var(--p)}
.ai-footer{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fff;border-top:1px solid var(--br)}
.ai-input{flex:1;border:1.5px solid var(--br);border-radius:20px;padding:9px 16px;font-size:12px;outline:none;background:#f8fafc;transition:all .2s;font-family:inherit}
.ai-input:focus{border-color:var(--p);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.ai-send{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .2s}
.ai-send:hover{transform:scale(1.05)}
.ai-send:disabled{opacity:.4;cursor:not-allowed;transform:none}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}

@media(max-width:768px){
  .sb{transform:translateX(-100%);width:280px;box-shadow:4px 0 24px rgba(0,0,0,.3)}
  .sb.open{transform:translateX(0)}.sb-x{display:block}
  .main{margin-left:0;padding:14px}.tb{left:0}
  .tb-burger{display:block}.tb-search{display:none}
  .stats{grid-template-columns:1fr 1fr;gap:8px}
  .fg{grid-template-columns:1fr}
  .sb-footer{display:none}
  .ai-chat{bottom:80px;right:12px;left:12px;width:auto;height:calc(100vh - 100px);max-height:none}
  .ai-fab{bottom:16px;right:16px;width:50px;height:50px;font-size:20px}
  .pg-head h2{font-size:17px}
}
</style>
</head>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>Vishal Groups - ERP System</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--p:#2563eb;--pd:#1d4ed8;--pl:#dbeafe;--s:#059669;--w:#d97706;--d:#dc2626;--bg:#f0f2f5;--wh:#fff;--tx:#1e293b;--tl:#64748b;--br:#e2e8f0;--sb:260px;--rd:12px}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden}

/* SIDEBAR */
.sb{position:fixed;left:0;top:0;bottom:0;width:var(--sb);background:linear-gradient(180deg,#0f172a 0%,#1e293b 100%);color:#fff;overflow-y:auto;z-index:200;transition:transform .3s ease}
.sb::-webkit-scrollbar{width:0}
.sb-h{padding:20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px}
.sb-logo{width:44px;height:44px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;box-shadow:0 4px 12px rgba(37,99,235,.3)}
.sb-brand{font-size:15px;font-weight:700;line-height:1.3}.sb-brand span{display:block;font-size:9px;color:#64748b;font-weight:500;letter-spacing:1.5px;margin-top:3px;text-transform:uppercase}
.sb-x{display:none;background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer;padding:6px;margin-left:auto;border-radius:8px}

  s = String(s).trim();
  let m = s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})$/);
  if(m) { let d=parseInt(m[1]), mo=parseInt(m[2])-1, y=parseInt(m[3]); if(y<100) y+=2000; return new Date(y, mo, d) }
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m) return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
  const dt = new Date(s);
  return isNaN(dt.getTime()) ? null : dt;
}
function calcDays(dateStr) { const dt = parseDate(dateStr); if(!dt) return 0; return Math.floor((new Date() - dt) / 864e5) }

function loadBOQ(inp) {
  if(!inp.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      D.boqItems = [];
      // Auto-detect header row
      let headerRow = 0;
      for(let i=0; i<Math.min(json.length, 5); i++) {
        const row = json[i];
        if(!row) continue;
        const txt = row.join(' ').toUpperCase();
        if(txt.includes('DESCRIPTION') || txt.includes('PARTICULAR') || txt.includes('ITEM')) {
          headerRow = i;
          break;
        }
      }
      // Parse data rows
      let totalAmt = 0;
      for(let i=headerRow+1; i<json.length; i++) {
        const r = json[i];
        if(!r || r.length < 2) continue;
        const desc = String(r[1] || r[0] || '').trim();
        if(!desc || desc.toUpperCase().includes('TOTAL') || desc.toUpperCase().includes('GRAND')) continue;
        const qty = pn(r[3]);
        const rate = pn(r[4]);
        const amt = pn(r[5]) || (qty * rate);
        if(qty === 0 && rate === 0 && amt === 0) continue;
        D.boqItems.push({
          sr: r[0] || (D.boqItems.length + 1),
          desc: desc,
          unit: String(r[2] || 'Nos'),
          qty: qty,
          rate: rate,
          amt: amt
        });
        totalAmt += amt;
      }
      drawBOQ();
      // Auto-fill amount field if BOQ has total
      if(totalAmt > 0 && !document.getElementById('de_amt').value) {
        document.getElementById('de_amt').value = totalAmt;
      }
      alert(`✅ ${D.boqItems.length} BOQ items imported! Total: ${fcFull(totalAmt)}`);
    } catch(er) {
      alert('❌ Error reading Excel: ' + er.message);
    }
  };
  reader.readAsArrayBuffer(inp.files[0]);
}

function calcPayment() {
  const rec = pn(document.getElementById('py_amt').value);
  const it = pn(document.getElementById('dd_it').value);
  const gst = pn(document.getElementById('dd_gst').value);
  const lc = pn(document.getElementById('dd_lc').value);
  const bd = pn(document.getElementById('dd_bd').value);
  const oth = pn(document.getElementById('dd_oth').value);
  const td = it + gst + lc + bd + oth;
  
  const hsd = pn(document.getElementById('hd_sd').value);
  const hld = pn(document.getElementById('hd_ld').value);
  const hg = pn(document.getElementById('hd_gst').value);
  const hw = pn(document.getElementById('hd_wh').value);
  const ho = pn(document.getElementById('hd_oth').value);
  const th = hsd + hld + hg + hw + ho;
  
  const net = rec - td - th;
  const invAmt = pn(document.getElementById('py_inv').options[document.getElementById('py_inv').selectedIndex]?.dataset?.amt);
  
  document.getElementById('dd_tot').value = fcFull(td);
  document.getElementById('hd_tot').value = fcFull(th);
  document.getElementById('sm_inv').textContent = fc(invAmt);
  document.getElementById('sm_rec').textContent = fc(rec);
  document.getElementById('sm_ded').textContent = fc(td);
  document.getElementById('sm_hold').textContent = fc(th);
  document.getElementById('sm_net').textContent = fc(net);
  document.getElementById('sm_bal').textContent = fc(invAmt - rec);
}

function savePayment() {
  const party = document.getElementById('py_party').value.trim();
  const site = document.getElementById('py_site').value.trim();
  const inv = document.getElementById('py_inv').value;
  const date = document.getElementById('py_date').value;
  const rec = pn(document.getElementById('py_amt').value);
  
  if(!party || !rec) { alert('⚠️ Party Name aur Received Amount zaroori hai!'); return; }
  if(!date) { alert('⚠️ Date select karo!'); return; }
  
  const invOpt = document.getElementById('py_inv').options[document.getElementById('py_inv').selectedIndex];
  const invAmt = pn(invOpt?.dataset?.amt);
  
  const it = pn(document.getElementById('dd_it').value);
  const gst = pn(document.getElementById('dd_gst').value);
  const lc = pn(document.getElementById('dd_lc').value);
  const bd = pn(document.getElementById('dd_bd').value);
  const oth = pn(document.getElementById('dd_oth').value);
  const td = it + gst + lc + bd + oth;
  
  const hsd = pn(document.getElementById('hd_sd').value);
  const hld = pn(document.getElementById('hd_ld').value);
  const hg = pn(document.getElementById('hd_gst').value);
  const hw = pn(document.getElementById('hd_wh').value);
  const ho = pn(document.getElementById('hd_oth').value);
  const th = hsd + hld + hg + hw + ho;
  
  D.payments.push({
    id: nid(), party, site, invoice: inv, date, invAmt, received: rec,
    itTds: it, gstTds: gst, labourCess: lc, billDisc: bd, otherDed: oth, totalDed: td,
    holdSD: hsd, holdLD: hld, holdGST: hg, holdWH: hw, holdOth: ho, totalHold: th,
    net: rec - td - th
  });
  
  // Auto add to Report tabs based on hold/deduction
  if(hsd > 0) D.sd.push({id:nid(), site, party, date, amount:hsd, invoice:inv});
  if(hld > 0) D.ld.push({id:nid(), site, party, date, amount:hld, invoice:inv});
  if(hg > 0) D.gst.push({id:nid(), site, party, date, amount:hg, invoice:inv});
  if(hw > 0) D.withheld.push({id:nid(), site, party, date, amount:hw, invoice:inv});
  if(ho > 0) D.hold.push({id:nid(), site, party, date, amount:ho, invoice:inv});
  if(oth > 0) D.otherDed.push({id:nid(), site, party, date, amount:oth, invoice:inv});
  
  // Reduce from pending
  if(inv) {
    const pIdx = D.pending.findIndex(p => p.invoice === inv);
    if(pIdx >= 0) {
      D.pending[pIdx].amount -= rec;
      if(D.pending[pIdx].amount <= 0) D.pending.splice(pIdx, 1);
    }
  }
  
  save(); renderAll(); clearPayment();
  alert('✅ Payment saved! Auto-updated Report tabs.');
}

    `<tr><td>${i+1}</td><td>${p.date}</td><td>${p.party}</td><td>${p.site||'-'}</td><td>${p.invoice||'-'}</td><td class="amt">${fc(p.invAmt)}</td><td class="amt" style="color:var(--s)">${fc(p.received)}</td><td class="amt" style="color:var(--d)">${fc(p.totalDed)}</td><td class="amt" style="color:#7c3aed">${fc(p.totalHold)}</td><td class="amt" style="color:var(--s);font-weight:800">${fc(p.net)}</td><td><button class="del" onclick="D.payments=D.payments.filter(x=>x.id!==${p.id});save();renderAll()">🗑</button></td></tr>`
  ).join('') || '<tr><td colspan="11" style="text-align:center;padding:20px;color:var(--tl)">No payments yet</td></tr>';
}

function saveRecovery() {
  const v = document.getElementById('rv_vendor').value.trim();
  const a = pn(document.getElementById('rv_amt').value);
  if(!v || !a) { alert('⚠️ Vendor Name aur Amount zaroori hai!'); return; }
  D.recoveries.push({
    id: nid(), vendor: v,
    invoice: document.getElementById('rv_inv').value.trim(),
    date: document.getElementById('rv_date').value,
    amount: a,
    type: document.getElementById('rv_type').value
  });
  save(); drawRecoveries();
  ['rv_vendor','rv_inv','rv_amt'].forEach(id => document.getElementById(id).value = '');
  alert('✅ Recovery saved!');
}

function drawRecoveries() {
  document.getElementById('tbRecov').innerHTML = D.recoveries.map((r, i) => 
    `<tr><td>${i+1}</td><td>${r.date}</td><td>${r.vendor}</td><td>${r.invoice||'-'}</td><td class="amt" style="color:var(--s)">${fc(r.amount)}</td><td>${r.type}</td><td><button class="del" onclick="D.recoveries=D.recoveries.filter(x=>x.id!==${r.id});save();drawRecoveries()">🗑</button></td></tr>`
  ).join('') || '<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--tl)">No recoveries yet</td></tr>';
}

function delItem(type, id) {
  if(!confirm('Delete this item?')) return;
  D[type] = D[type].filter(x => x.id !== id);
  save(); renderAll();
}

// ==================== STATS UPDATE ====================
function updateStats() {
  const tP = D.pending.reduce((s,b) => s+b.amount, 0);
  const tSD = D.sd.reduce((s,b) => s+b.amount, 0);
  const tLD = D.ld.reduce((s,b) => s+b.amount, 0);
  const tH = D.hold.reduce((s,b) => s+b.amount, 0);
  const tO = D.otherDed.reduce((s,b) => s+b.amount, 0);
  const tG = D.gst.reduce((s,b) => s+b.amount, 0);
  const tW = D.withheld.reduce((s,b) => s+b.amount, 0);
  
  document.getElementById('rPend').textContent = fc(tP);
  document.getElementById('rSD').textContent = fc(tSD);
  document.getElementById('rLD').textContent = fc(tLD);
  document.getElementById('rHold').textContent = fc(tH);
  document.getElementById('rOther').textContent = fc(tO);
  document.getElementById('rGST').textContent = fc(tG);
  document.getElementById('rWH').textContent = fc(tW);
  document.getElementById('rTotal').textContent = fc(tP+tSD+tLD+tH+tO+tG+tW);
  
  const veT = D.salesVE.reduce((s,x) => s+pn(x.amount), 0);
  const vtT = D.salesVTPL.reduce((s,x) => s+pn(x.amount), 0);
  document.getElementById('sVE').textContent = fc(veT);
  document.getElementById('sVTPL').textContent = fc(vtT);
  document.getElementById('sComb').textContent = fc(veT+vtT);
  document.getElementById('sNew').textContent = D.salesVE.filter(x => x.code==='N').length + D.salesVTPL.filter(x => x.code==='N').length;
  document.getElementById('sRep').textContent = D.salesVE.filter(x => x.code==='R').length + D.salesVTPL.filter(x => x.code==='R').length;
  
  const pr = D.payments.reduce((s,p) => s+pn(p.received), 0);
  const pd = D.payments.reduce((s,p) => s+pn(p.totalDed), 0);
  const ph = D.payments.reduce((s,p) => s+pn(p.totalHold), 0);
  document.getElementById('pRec').textContent = fc(pr);
  document.getElementById('pDed').textContent = fc(pd);
  document.getElementById('pHold').textContent = fc(ph);
  document.getElementById('pNet').textContent = fc(pr-pd-ph);
}
</script>
<script>
// ==================== LIVE SYNC ====================
async function liveSync() {
  showSync('🔄 Syncing...', 'blue');
  let sOk = false, pOk = false;
  
  // Stock sync
  try {
    const r = await fetch(STOCK_API + '?t=' + Date.now());
    const d = await r.json();
    if(d.data?.length > 0) {
      Array.isArray(d.data[0]) ? parseStockRaw(d.data) : parseStockObj(d.data);
      sOk = true;
    } else if(d.stock?.length > 0) {
      parseStockRaw(d.stock);
      sOk = true;
    }
  } catch(e) { console.warn('Stock API fail:', e.message); }
  
  if(!sOk) {
    try {
      const r = await fetch(STOCK_CSV + '&t=' + Date.now());
      const t = await r.text();
      parseStockRaw(t.split('\n').map(csvRow));
      sOk = true;
    } catch(e) { console.warn('Stock CSV fail:', e.message); }
  }
  
  // Payment sync
  try {
    const r = await fetch(PAY_CSV + '&t=' + Date.now());
    const t = await r.text();
    parsePaymentSheet(t.split('\n').map(csvRow));
    pOk = true;
  } catch(e) { console.warn('Payment fail:', e.message); }
  
  save(); renderAll();
  
  if(sOk && pOk) showSync('✅ ' + new Date().toLocaleTimeString('en-IN'), 'green');
  else if(sOk) showSync('⚠️ Stock Only', 'orange');
  else if(pOk) showSync('⚠️ Payment Only', 'orange');
  else showSync('❌ Sync Failed', 'red');
}

function parsePaymentSheet(rows) {
  if(!rows || rows.length < 3) return;
  D.outstanding = [];
  let start = 0;
  for(let i = 0; i < Math.min(rows.length, 10); i++) {
    const txt = (rows[i] || []).join(' ').toUpperCase();
    if((txt.includes('S.NO') || txt.includes('S NO')) && (txt.includes('PROJECT') || txt.includes('SITE'))) {
      start = i + 1;
      break;
    }
  }
  if(!start) start = 3;
  
  for(let i = start; i < rows.length; i++) {
    const r = rows[i];
    if(!r || !r.length) continue;
    const site = String(r[1] || '').trim();
    if(!site || site.length < 2 || site.toUpperCase().includes('TOTAL')) continue;
    
    const pending = pn(r[3]), sd = pn(r[4]), ld = pn(r[5]), gst = pn(r[6]);
    const instant = pn(r[7]), other = pn(r[8]), wh = pn(r[9]), total = pn(r[10]);
    if(total === 0 && pending === 0 && sd === 0 && ld === 0 && wh === 0) continue;
    
    D.outstanding.push({
      id: nid(),
      sno: pn(r[0]) || D.outstanding.length + 1,
      site,
      sheetLink: String(r[2] || ''),
      pending, sd, ld, gst, instant, other, wh, total
    });
    if(!D.sites.includes(site)) D.sites.push(site);
  }
}

// ==================== STOCK PARSING ====================
function parseStockRaw(rows) {
  const ve = [], vt = [];
  let dt = '', sec = '';
  for(let i = 0; i < rows.length; i++) {
    const r = rows[i];
    if(!r || !r.length) continue;
    const txt = r.join(' ').toUpperCase();
    
    if(txt.includes('STOCK AS ON')) {
      for(let v of r) if(v && String(v).match(/\d+\/\d+\/\d+/)) { dt = v; break; }
      continue;
    }
    if(txt.includes('VE STOCK') && !txt.includes('VTPL')) { sec = 'VE'; continue; }
    if(txt.includes('VTPL STOCK')) { sec = 'VTPL'; continue; }
    if(txt.includes('S.NO') && txt.includes('SITE')) continue;
    if(txt.includes('NET STOCK') || txt.includes('TOTAL BOTH')) continue;
    if(r[1] && String(r[1]).toUpperCase().trim() === 'TOTAL') continue;
    
    const sno = pn(r[0]);
    const site = r[1] ? String(r[1]).trim() : '';
    if(sno > 0 && site.length > 2 && sec) {
      const item = {
        id: sno, sno, siteName: site,
        tabLink: String(r[2] || ''),
        stockValue: pn(r[3]),
        siteExpenses: pn(r[4]),
        netWIP: pn(r[5]),
        remarks: String(r[6] || ''),
        driveLink: String(r[7] || ''),
        dayAgeing: pn(r[8]),
        cell: String(r[9] || ''),
        company: sec
      };
      if(sec === 'VE') ve.push(item); else vt.push(item);
    }
  }
  storeStock(ve, vt, dt);
}

function parseStockObj(rows) {
  const ve = [], vt = [];
  let dt = '', sec = '';
  for(let r of rows) {
    const vals = Object.values(r);
    const txt = vals.join(' ').toUpperCase();
    
    if(txt.includes('STOCK AS ON')) {
      for(let v of vals) if(v && String(v).match(/\d+\/\d+\/\d+/)) { dt = v; break; }
      continue;
    }
    if(txt.includes('VE STOCK') && !txt.includes('VTPL')) { sec = 'VE'; continue; }
    if(txt.includes('VTPL STOCK')) { sec = 'VTPL'; continue; }
    
    const sno = pn(vals[0]);
    const site = vals[1] ? String(vals[1]).trim() : '';
    if(sno > 0 && site.length > 2 && sec) {
      const item = {
        id: sno, sno, siteName: site,
        tabLink: String(vals[2] || ''),
        stockValue: pn(vals[3]),
        siteExpenses: pn(vals[4]),
        netWIP: pn(vals[5]),
        remarks: String(vals[6] || ''),
        driveLink: String(vals[7] || ''),
        dayAgeing: pn(vals[8]),
        cell: String(vals[9] || ''),
        company: sec
      };
      if(sec === 'VE') ve.push(item); else vt.push(item);
    }
  }
  storeStock(ve, vt, dt);
}

function storeStock(ve, vt, dt) {
  D.veStock = ve;
  D.vtplStock = vt;
  const veT = ve.reduce((s,x) => s+x.stockValue, 0);
  const veE = ve.reduce((s,x) => s+x.siteExpenses, 0);
  const veW = ve.reduce((s,x) => s+x.netWIP, 0);
  const vtT = vt.reduce((s,x) => s+x.stockValue, 0);
  const vtE = vt.reduce((s,x) => s+x.siteExpenses, 0);
  const vtW = vt.reduce((s,x) => s+x.netWIP, 0);
  D.stockSum = {
    date: dt, veTotal: veT, veExp: veE, veWIP: veW,
    vtplTotal: vtT, vtplExp: vtE, vtplWIP: vtW,
    netTotal: veT + vtT, netWIP: veW + vtW
  };
}

function drawStock() {
  const tb = document.getElementById('tbStock');
  const sm = D.stockSum || {};
  const total = D.veStock.length + D.vtplStock.length;
  
  document.getElementById('stSites').textContent = total;
  document.getElementById('stVal').textContent = fc(sm.netTotal);
  document.getElementById('stWIP').textContent = fc(sm.netWIP);
  document.getElementById('stAge').textContent = [...D.veStock, ...D.vtplStock].filter(s => s.dayAgeing > 180).length;
  
  document.getElementById('heroStock').innerHTML = total > 0 ? `<div class="hero blue">
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px"><h3>📊 WIP Stock Summary</h3><span style="font-size:10px;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:10px">📅 ${sm.date || '-'}</span></div>
  <div class="hg">
    <div class="hb"><div class="hl-txt">🏢 VE Stock</div><div class="hv">${fc(sm.veTotal)}</div><div class="hs">${D.veStock.length} sites</div></div>
    <div class="hb"><div class="hl-txt">🏭 VTPL Stock</div><div class="hv">${fc(sm.vtplTotal)}</div><div class="hs">${D.vtplStock.length} sites</div></div>
    <div class="hb"><div class="hl-txt">💰 Net WIP</div><div class="hv">${fc(sm.netWIP)}</div></div>
    <div class="hb hl"><div class="hl-txt">🏆 NET TOTAL</div><div class="hv">${fc(sm.netTotal)}</div></div>
  </div></div>` : '';
  
  if(!total) {
    tb.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--tl)">🔄 Click Sync to load stock...</td></tr>';
    return;
  }
  
  let h = '';
  if(sm.date) h += `<tr style="background:#fef3c7"><td colspan="8" style="padding:10px;font-weight:700;text-align:center">📅 Stock as on: ${sm.date}</td></tr>`;
  
  const sV = !D.fc || D.fc === 'VE';
  const sT = !D.fc || D.fc === 'VTPL';
  
  if(sV && D.veStock.length) {
    h += `<tr class="sec-row ve"><td colspan="8">🏢 VE STOCK (${D.veStock.length} sites)</td></tr>`;
    D.veStock.forEach(s => h += stockTR(s));
    h += `<tr class="tot-row ve"><td colspan="2" style="text-align:right">VE TOTAL ➤</td><td class="amt">${fc(sm.veTotal)}</td><td class="amt">${fc(sm.veExp)}</td><td class="amt" style="color:var(--s)">${fc(sm.veWIP)}</td><td colspan="3"></td></tr>`;
  }
  if(sT && D.vtplStock.length) {
    h += `<tr class="sec-row vtpl"><td colspan="8">🏭 VTPL STOCK (${D.vtplStock.length} sites)</td></tr>`;
    D.vtplStock.forEach(s => h += stockTR(s));
    h += `<tr class="tot-row vtpl"><td colspan="2" style="text-align:right">VTPL TOTAL ➤</td><td class="amt">${fc(sm.vtplTotal)}</td><td class="amt">${fc(sm.vtplExp)}</td><td class="amt" style="color:var(--s)">${fc(sm.vtplWIP)}</td><td colspan="3"></td></tr>`;
  }
  if(!D.fc) h += `<tr class="g-total"><td colspan="4" style="text-align:right">🏆 NET STOCK TOTAL ➤</td><td class="amt">${fc(sm.netTotal)}</td><td colspan="3"></td></tr>`;
  
  tb.innerHTML = h;
}

function stockTR(s) {
  return `<tr><td><strong>${s.sno}</strong></td><td><strong>${s.siteName}</strong></td><td class="amt">${fc(s.stockValue)}</td><td class="amt">${fc(s.siteExpenses)}</td><td class="amt" style="font-weight:700;color:var(--s)">${fc(s.netWIP)}</td><td style="font-size:10px;max-width:120px;overflow:hidden;text-overflow:ellipsis">${s.remarks || '-'}</td><td>${s.driveLink && s.driveLink.startsWith('http') ? `<a href="${s.driveLink}" target="_blank" style="color:#3b82f6">📎</a>` : '-'}</td><td><span class="age-b" style="background:${ageColor(s.dayAgeing)}">${s.dayAgeing}d</span></td></tr>`;
}

// ==================== DEBTORS ====================
async function fetchDebtors() {
  document.getElementById('debtorProgress').style.display = 'block';
  document.getElementById('dbBar').style.width = '0%';
  document.getElementById('dbStatus').textContent = 'Starting fetch...';
  D.debtors = [];
  let done = 0, total = SITE_GIDS.length;
  
  for(let gid of SITE_GIDS) {
    try {
      const url = `https://docs.google.com/spreadsheets/d/${PAY_SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`;
      const r = await fetch(url);
      if(!r.ok) throw new Error('Fetch failed');
      const t = await r.text();
      parseDebtorSheet(t.split('\n').map(csvRow), gid);
    } catch(e) { console.warn('GID fail:', gid, e.message); }
    
    done++;
    document.getElementById('dbBar').style.width = Math.round((done/total)*100) + '%';
    document.getElementById('dbStatus').textContent = `Fetching ${done}/${total} sites... (${D.debtors.length} pending found)`;
  }
  
  document.getElementById('debtorProgress').style.display = 'none';
  D.debtors.sort((a,b) => b.days - a.days);
  save();
  drawDebtors();
  updateStats();
}

function parseDebtorSheet(rows, gid) {
  if(!rows || rows.length < 3) return;
  let siteName = 'GID-' + gid;
  let headerRow = -1;
  let invNoCol = 2, invDateCol = 3, totalAmtCol = 6, shortPayCol = 17;
  
  // Find party name
  for(let i = 0; i < Math.min(rows.length, 10); i++) {
    const r = rows[i];
    if(!r) continue;
    for(let j = 0; j < r.length; j++) {
      const v = String(r[j] || '').trim();
      if(v.length > 5 && (v.toUpperCase().includes('LIMITED') || v.toUpperCase().includes('LTD') || v.toUpperCase().includes('IOCL') || v.toUpperCase().includes('GAIL') || v.toUpperCase().includes('HPCL') || v.toUpperCase().includes('NFC') || v.toUpperCase().includes('INDIAN') || v.toUpperCase().includes('CORPORATION') || v.toUpperCase().includes('NUCLEAR'))) {
        siteName = v;
        break;
      }
    }
    if(siteName !== 'GID-' + gid) break;
  }
  
  // Find header & detect columns
  for(let i = 0; i < Math.min(rows.length, 15); i++) {
    const r = rows[i];
    if(!r) continue;
    const txt = r.join(' ').toUpperCase();
    if(txt.includes('INVOICE') && (txt.includes('DATE') || txt.includes('SHORT'))) {
      headerRow = i;
      for(let j = 0; j < r.length; j++) {
        const colName = String(r[j] || '').toUpperCase().trim();
        if(colName === 'INVOICE NO' || colName === 'INVOICE NO.' || (colName.includes('INVOICE') && colName.includes('NO'))) invNoCol = j;
        else if(colName.includes('INV') && colName.includes('DATE')) invDateCol = j;
        else if(colName.includes('TOTAL') && colName.includes('INVOICE')) totalAmtCol = j;
        else if(colName.includes('SHORT') && colName.includes('PAY')) shortPayCol = j;
      }
      break;
    }
  }
  if(headerRow < 0) headerRow = 4;
  
  const invoiceMap = new Map();
  let lastInvNo = '', lastInvDate = '', lastTotalAmt = 0;
  
  for(let i = headerRow + 1; i < rows.length; i++) {
    const r = rows[i];
    if(!r || !r.length) continue;
    const txt = r.join(' ').toUpperCase();
    if(txt.includes('NET SD DEDUCTION') || txt.includes('FOLLOW-UP')) break;
    
    let invNo = String(r[invNoCol] || '').trim();
    let invDate = String(r[invDateCol] || '').trim();
    let totalAmt = pn(r[totalAmtCol]);
    let shortPay = pn(r[shortPayCol]);
    
    if(invNo.toUpperCase().includes('TOTAL')) continue;
    if(invNo.toUpperCase().includes('NET')) continue;
    
    if(!invNo || invNo.length < 3) {
      if(lastInvNo && shortPay > 0) {
        invNo = lastInvNo;
        invDate = lastInvDate;
        totalAmt = lastTotalAmt;
      } else continue;
    } else {
      lastInvNo = invNo;
      lastInvDate = invDate;
      lastTotalAmt = totalAmt;
    }
    
    if(shortPay <= 0) continue;
    
    const key = siteName + '|' + invNo;
    if(invoiceMap.has(key)) {
      invoiceMap.get(key).shortPayment += shortPay;
    } else {
      invoiceMap.set(key, {
        id: nid(), site: siteName, gid: gid,
        invoiceNo: invNo, invoiceDate: invDate,
        totalAmount: totalAmt, shortPayment: shortPay,
        days: calcDays(invDate)
      });
    }
  }
  
  invoiceMap.forEach(inv => D.debtors.push(inv));
}

function drawDebtors() {
  const tb = document.getElementById('tbDebtors');
  if(!D.debtors.length) {
    tb.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--tl)">🔄 Click "Fetch All Sites" to load...</td></tr>';
    document.getElementById('heroDebtors').innerHTML = '';
    return;
  }
  
  let filtered = D.debtors;
  if(D.debtorFilter === 'critical') filtered = D.debtors.filter(d => d.days > 180);
  else if(D.debtorFilter === 'overdue') filtered = D.debtors.filter(d => d.days >= 90 && d.days <= 180);
  else if(D.debtorFilter === 'due') filtered = D.debtors.filter(d => d.days >= 30 && d.days < 90);
  else if(D.debtorFilter === 'current') filtered = D.debtors.filter(d => d.days < 30);
  
  let totalInv = 0, totalShort = 0;
  tb.innerHTML = filtered.map((d, i) => {
    totalInv += d.totalAmount;
    totalShort += d.shortPayment;
    const status = d.days > 180 ? '🔴 Critical' : d.days >= 90 ? '🟠 Overdue' : d.days >= 30 ? '🟡 Due' : '🟢 Current';
    return `<tr><td>${i+1}</td><td><strong>${d.site}</strong></td><td>${d.invoiceNo}</td><td>${d.invoiceDate}</td><td class="amt">${fc(d.totalAmount)}</td><td class="amt" style="color:var(--d);font-weight:800">${fc(d.shortPayment)}</td><td><span class="age-b" style="background:${ageColor(d.days)}">${d.days}d</span></td><td><strong style="font-size:10px">${status}</strong></td></tr>`;
  }).join('');
  
  document.getElementById('dbInvTot').textContent = fc(totalInv);
  document.getElementById('dbShortTot').textContent = fc(totalShort);
  
  const totalAmt = D.debtors.reduce((s,d) => s+d.shortPayment, 0);
  const uniqueSites = new Set(D.debtors.map(d => d.site)).size;
  const critical = D.debtors.filter(d => d.days > 180).length;
  document.getElementById('dbInv').textContent = D.debtors.length;
  document.getElementById('dbAmt').textContent = fc(totalAmt);
  document.getElementById('dbSites').textContent = uniqueSites;
  document.getElementById('dbCrit').textContent = critical;
  
  const c1 = D.debtors.filter(d => d.days < 30).reduce((s,d) => s+d.shortPayment, 0);
  const c2 = D.debtors.filter(d => d.days >= 30 && d.days < 90).reduce((s,d) => s+d.shortPayment, 0);
  const c3 = D.debtors.filter(d => d.days >= 90 && d.days <= 180).reduce((s,d) => s+d.shortPayment, 0);
  const c4 = D.debtors.filter(d => d.days > 180).reduce((s,d) => s+d.shortPayment, 0);
  
  document.getElementById('heroDebtors').innerHTML = `<div class="hero red">
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px"><h3>⏰ Debtors Ageing Summary</h3><span style="font-size:10px;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:10px">🔴 LIVE • ${uniqueSites} sites</span></div>
  <div class="hg">
    <div class="hb"><div class="hl-txt">🟢 0-30 days</div><div class="hv">${fc(c1)}</div><div class="hs">${D.debtors.filter(d => d.days < 30).length} inv</div></div>
    <div class="hb"><div class="hl-txt">🟡 30-90 days</div><div class="hv">${fc(c2)}</div><div class="hs">${D.debtors.filter(d => d.days >= 30 && d.days < 90).length} inv</div></div>
    <div class="hb"><div class="hl-txt">🟠 90-180 days</div><div class="hv">${fc(c3)}</div><div class="hs">${D.debtors.filter(d => d.days >= 90 && d.days <= 180).length} inv</div></div>

function exportDebtors() {

  let csv = 'Site,Invoice No,Invoice Date,Total Amount,Short Payment,Days,Status\n';
  D.debtors.forEach(d => {
    const status = d.days > 180 ? 'Critical' : d.days >= 90 ? 'Overdue' : d.days >= 30 ? 'Due' : 'Current';
    csv += `"${d.site}","${d.invoiceNo}","${d.invoiceDate}",${d.totalAmount},${d.shortPayment},${d.days},"${status}"\n`;
  });
  const b = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'debtors_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function csvRow(line) {
  if(!line) return [];
  const r = [];
  let c = '', q = false;
  for(let i = 0; i < line.length; i++) {
    const ch = line[i];
    if(ch === '"') {
      if(q && line[i+1] === '"') { c += '"'; i++; }
      else q = !q;
    } else if(ch === ',' && !q) {
      r.push(c.trim());
      c = '';
    } else c += ch;
  }
  r.push(c.trim());
  return r.map(v => v.replace(/^"|"$/g, ''));
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatAIResponse(text) {
  let html = text;
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre>$2</pre>');
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  
  if(html.includes('|')) {
    const lines = html.split('\n');
    let inTable = false, tableHtml = '', result = [];
    for(let line of lines) {
      if(line.trim().startsWith('|') && line.trim().endsWith('|')) {
        if(!inTable) { inTable = true; tableHtml = '<table>'; }
        if(line.includes('---')) continue;
        const cells = line.split('|').filter(c => c.trim());
        const tag = !tableHtml.includes('<td>') ? 'th' : 'td';
        tableHtml += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
      } else {
        if(inTable) { tableHtml += '</table>'; result.push(tableHtml); tableHtml = ''; inTable = false; }
        result.push(line);
      }
    }
    if(inTable) { tableHtml += '</table>'; result.push(tableHtml); }
    html = result.join('\n');
  }
  
  html = html.replace(/^- (.*)/gm, '• $1');
  html = html.replace(/\n/g, '<br>');
  return html;
}

async function sendAI() {
  const input = document.getElementById('aiInput');
  const sendBtn = document.getElementById('aiSend');
  const query = input.value.trim();
  if(!query) return;
  
  addUserMsg(query);
  aiMessages.push({role:'user', parts:[{text: query}]});
  input.value = '';
  sendBtn.disabled = true;
  showTyping();
  
  try {
    const context = getERPContext();
    const requestBody = {
      contents: [
        { role: 'user', parts: [{ text: context }] },
        { role: 'model', parts: [{ text: 'Samjha! Main VG AI hoon. Pucho kya jaanna hai! 🤖' }] },
        ...aiMessages.slice(-10)
      ],
      generationConfig: { temperature: 0.7, maxOutputTokens: 2048, topP: 0.9 }
    };
    
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${AI_API_KEY}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody) }
    );
    
    hideTyping();
    
    if(!response.ok) {
      const err = await response.json().catch(() => ({}));
      addBotMsg(`❌ Error: ${err.error?.message || 'API failed'}. Thodi der baad try karo.`);
      sendBtn.disabled = false;
      return;
    }
    
    const data = await response.json();
    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sorry, response nahi mila. Dobara try karo!';
    aiMessages.push({role:'model', parts:[{text: aiText}]});
    addBotMsg(aiText);
  } catch(err) {
    hideTyping();
    addBotMsg(`❌ Network error: ${err.message}\n\nInternet check karo!`);
  }
  
  sendBtn.disabled = false;
  input.focus();
}
